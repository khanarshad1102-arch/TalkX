<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TalkX</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .wrap {
      max-width: 700px;
      margin: 0 auto;
    }
    #status {
      margin: 12px 0;
      color: #bbbbbb;
      min-height: 28px;
    }
    #chat {
      height: 320px;
      overflow: auto;
      border: 1px solid #333;
      margin: 20px 0;
      padding: 12px;
      text-align: left;
      background: #111;
      border-radius: 10px;
    }
    .controls {
      display: flex;
      gap: 8px;
    }
    input {
      flex: 1;
      padding: 12px;
      background: #1a1a1a;
      color: white;
      border: 1px solid #333;
      border-radius: 8px;
    }
    button {
      padding: 12px 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .secondary {
      background: #444;
    }
    .note {
      margin-top: 14px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1>TalkX 🌍</h1>
  <p>Anonymous Global Chat</p>

  <div id="status">Connecting...</div>
  <div id="chat"></div>

  <div class="controls">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
    <button class="secondary" onclick="nextUser()">Next</button>
  </div>

  <div class="note">Voice chat will be added next 🚀</div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("https://talkx.onrender.com", {
  transports: ["websocket", "polling"],
  reconnection: true,
  reconnectionAttempts: Infinity,
  reconnectionDelay: 1000,
  reconnectionDelayMax: 5000,
  timeout: 20000
});

const chat = document.getElementById("chat");
const statusEl = document.getElementById("status");
const input = document.getElementById("msg");

function addLine(html) {
  chat.innerHTML += "<p>" + html + "</p>";
  chat.scrollTop = chat.scrollHeight;
}

socket.on("connect", () => {
  statusEl.innerText = "Connected to server";
  addLine("<i>Connected to server</i>");
});

socket.on("waiting", () => {
  statusEl.innerText = "Waiting for stranger...";
  addLine("<i>Waiting for stranger...</i>");
});

socket.on("connected", () => {
  statusEl.innerText = "Connected to stranger";
  addLine("<b>Connected to stranger</b>");
});

socket.on("message", (msg) => {
  addLine("<b>Stranger:</b> " + msg);
});

socket.on("partner-disconnected", () => {
  statusEl.innerText = "Stranger left. Looking for new stranger...";
  addLine("<i>Stranger disconnected</i>");
});

socket.io.on("reconnect_attempt", () => {
  statusEl.innerText = "Reconnecting to server...";
});

socket.io.on("reconnect", () => {
  statusEl.innerText = "Reconnected. Looking for stranger...";
  addLine("<i>Reconnected</i>");
});

socket.on("disconnect", () => {
  statusEl.innerText = "Disconnected. Reconnecting...";
  addLine("<i>Server disconnected</i>");
});

function send() {
  const text = input.value.trim();
  if (!text) return;
  socket.emit("message", text);
  addLine("<b>You:</b> " + text);
  input.value = "";
}

function nextUser() {
  socket.emit("next");
  addLine("<i>Searching for next stranger...</i>");
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
