<!DOCTYPE html>
<html>
<head>
  <title>TalkX</title>
  <style>
    body { background:#0f0f0f; color:white; text-align:center; font-family:Arial; }
    #chat { height:300px; overflow:auto; border:1px solid #333; margin:20px; padding:10px; }
    input { padding:10px; width:70%; background:#1a1a1a; color:white; border:none; }
    button { padding:10px; background:#4caf50; color:white; border:none; }
  </style>
</head>
<body>

<h1>TalkX 🌍</h1>
<p>Anonymous Global Chat</p>

<div id="chat"></div>

<input id="msg" placeholder="Type message..." />
<button onclick="send()">Send</button>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io("https://talkx.onrender.com");

const chat = document.getElementById("chat");

socket.on("connected", () => {
  chat.innerHTML += "<p><i>Connected to stranger</i></p>";
});

socket.on("message", (msg) => {
  chat.innerHTML += "<p><b>Stranger:</b> " + msg + "</p>";
});

function send() {
  const input = document.getElementById("msg");
  socket.emit("message", input.value);
  chat.innerHTML += "<p><b>You:</b> " + input.value + "</p>";
  input.value = "";
}
</script>

</body>
</html>
